name: Update JSON Automático

on:
  release:
    types: [published]

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Instalar jq
        run: sudo apt-get install -y jq

      - name: Gerar e atualizar JSON
        shell: bash
        env:
          VERSION: ${{ github.event.release.tag_name }}
          # Remove o prefixo 'v' se você usa tags como 'v1.0.0'
          VERSION_CLEAN: ${{ github.event.release.tag_name }}
          DATE: ${{ github.event.release.published_at }}
          BODY: ${{ github.event.release.body }}
          URL: ${{ github.event.release.assets[0].browser_download_url }}
        run: |
          # Transforma o body da release em um array JSON simples
          # Assume que itens no changelog estão separados por quebra de linha
          CHANGELOG=$(echo "$BODY" | jq -R -s 'split("\n") | map(select(length > 0))')
          
          # Cria o novo objeto de release
          NEW_RELEASE=$(jq -n \
            --arg ver "${VERSION_CLEAN#v}" \
            --arg date "$DATE" \
            --arg url "$URL" \
            --argjson changes "$CHANGELOG" \
            '{version: $ver, date: ($date | split("T")[0]), changelog: $changes, downloadUrl: $url}')
          
          # Insere o novo release no topo da lista "releases" e atualiza o "latestVersion"
          cat update.json | \
          jq --argjson new "$NEW_RELEASE" \
            '.latestVersion = $new.version | .releases = ([$new] + .releases)' \
            > update.json.tmp && mv update.json.tmp update.json

      - name: Commit e Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git commit -m "Automated update: ${{ github.event.release.tag_name }}"
          git push
