name: Update JSON Automático

on:
  release:
    types: [published]

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para permitir que a Action faça o git commit de volta no repositório
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Gerar novo JSON
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          # Pega a URL de download do primeiro arquivo (asset) anexado à release
          DOWNLOAD_URL: ${{ github.event.release.assets[0].browser_download_url }}
        run: |
          # Remove o prefixo 'v' da tag, se existir (ex: v1.0.0 -> 1.0.0)
          VERSION=${RELEASE_TAG#v}

          echo "Atualizando para versão $VERSION..."
          echo "Download URL: $DOWNLOAD_URL"

          # O arquivo 'update.json' DEVE existir na raiz do seu repositório.
          # O 'jq' atualizará os campos de forma segura e estruturada.
          if [ -f "update.json" ]; then
            jq --arg vn "$VERSION" \
               --arg du "$DOWNLOAD_URL" \
               '.versionName = $vn | .downloadUrl = $du' \
               update.json > update.json.tmp && mv update.json.tmp update.json
            
            echo "JSON atualizado com sucesso."
          else
            echo "Erro: Arquivo 'update.json' não encontrado na raiz!"
            exit 1
          fi

      - name: Commit e Push das alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git commit -m "Automated update: ${RELEASE_TAG}"
          git push
